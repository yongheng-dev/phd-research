- name: "AI Ethics and Academic Integrity"
  description: "Addresses responsible AI use, plagiarism concerns, transparency, and normative questions about acceptable educational practices."

- name: "Privacy and Data Governance"
  description: "Covers consent, data protection, surveillance, and governance of learner data used by AI systems."

- name: "Educational Equity"
  description: "Examines whether AI tools widen or reduce disparities across socioeconomic, linguistic, disability, or geographic groups."

- name: "Teacher Role Transformation"
  description: "Considers how AI shifts teachers' work, authority, expertise, and professional identity."

- name: "Student Agency"
  description: "Explores whether AI support enhances or undermines learner autonomy, self-regulation, and critical thinking."

- name: "Policy and Institutional Governance"
  description: "Focuses on school and university policies, procurement, regulation, and implementation guidance for AI in education."

- name: "Trust and Transparency"
  description: "Investigates how explainability, accuracy, and perceived fairness affect willingness to use AI systems in teaching and learning."
