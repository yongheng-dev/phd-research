- name: "Constructivism"
  description: "Learners actively construct knowledge through experience and reflection; learning is situated and contextual. Key figures include Piaget (cognitive) and Vygotsky (social)."

- name: "Sociocultural Theory (Vygotsky)"
  description: "Learning occurs through social interaction within the Zone of Proximal Development (ZPD); emphasizes mediation by tools, language, and more knowledgeable others."

- name: "Connectivism (Siemens)"
  description: "Learning is the process of creating connections across networks of information; knowledge resides in distributed nodes. Particularly relevant in the digital age."

- name: "Self-Regulated Learning (SRL)"
  description: "Learners plan, monitor, and evaluate their own cognitive processes; encompasses metacognition, motivation, and strategic behavior. Key models by Zimmerman and Pintrich."

- name: "Cognitive Load Theory (CLT)"
  description: "Instructional design should manage intrinsic, extraneous, and germane cognitive load to optimize learning within working memory constraints. Developed by Sweller."

- name: "Social Cognitive Theory (Bandura)"
  description: "Learning occurs through observation, imitation, and modeling; self-efficacy beliefs mediate motivation and achievement. Reciprocal determinism among behavior, environment, and person."

- name: "Technology Acceptance Model (TAM/UTAUT)"
  description: "Perceived usefulness and perceived ease of use predict technology adoption intentions. UTAUT extends TAM with social influence, facilitating conditions, and moderators."

- name: "TPACK Framework"
  description: "Technological Pedagogical Content Knowledge — the intersection of technology, pedagogy, and content knowledge that teachers need for effective technology integration."

- name: "Community of Inquiry (CoI)"
  description: "Meaningful online learning requires the intersection of social presence, cognitive presence, and teaching presence. Widely used in blended and online learning research."

- name: "Activity Theory"
  description: "Human activity is mediated by tools and shaped by rules, community, and division of labor. Cultural-Historical Activity Theory (CHAT) extends this to analyze contradictions in educational systems."

- name: "Transformative Learning (Mezirow)"
  description: "Adult learners undergo perspective transformation through critical reflection on assumptions, leading to more inclusive and integrative frames of reference."
