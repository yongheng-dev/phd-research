id: doctrine-004
suite: doctrine
severity: P1
description: Draft command produces writing that declares doctrine fields when proposing directions.
command: /draft
args: "--section=discussion --sources=tag:srl-ai --words=500 --effort=standard"
expected_properties:
  - kind: file_exists
    path_glob: "/Users/xuyongheng/Obsidian-Vault/Writing/*.md"
  - kind: doctrine_fields_present
    fields_required_all: [mainstream_anchor, sub_branch, theoretical_contribution, so_what]
    for_section: "any research direction proposed"
  - kind: audit_verdict_present
    audit_agent: citation-verifier
tags: [doctrine, writing]
