# Eval query schema template. Copy this file and fill in the fields.
id: example-001
suite: search              # search | summarize | doctrine | audit | integration
severity: P1               # P0 (blocker) | P1 (major) | P2 (minor)
description: >
  One-line human description of what this query probes.

command: /search-papers    # OpenCode slash command under test
args: "self-regulated learning LLM --effort=quick"

# Pre-conditions the harness should check before running (optional)
preconditions: []

# Properties that MUST hold after the command completes
expected_properties:
  - kind: file_exists
    path_glob: "/Users/xuyongheng/Obsidian-Vault/Search Results/*self-regulated*.md"
  - kind: frontmatter_has
    field: type
    equals: search-results
  - kind: min_count
    what: citations_in_body
    min: 5
  - kind: trace_audit_verdict
    trace_file_glob: ".opencode/traces/*/search.jsonl"
    verdict_in: [ok, warn]
  - kind: doctrine_fields_present  # only if the command is research-facing
    fields_required_any_of: 0      # 0 means not required for this query

# Optional: tags for filtering
tags: [search, smoke]
