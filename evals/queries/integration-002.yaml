id: integration-002
suite: integration
severity: P1
description: /fetch → /extract → /draft chain preserves identifier and cites correctly.
command: /fetch
args: "10.1016/j.compedu.2023.104844 --effort=quick"
followups:
  - command: /extract
    args: "<last-fetched-paper> --effort=standard"
  - command: /draft
    args: "--section=related-work --sources=<last-extracted-paper> --words=200 --effort=quick"
expected_properties:
  - kind: chain_identifier_stable
    identifier: "10.1016/j.compedu.2023.104844"
  - kind: draft_cites_identifier: true
tags: [integration, chain]
