- name: "Design-Based Research"
  description: "Iterative design, implementation, and refinement of AI-supported learning interventions in authentic educational settings."

- name: "Mixed Methods"
  description: "Combines quantitative and qualitative evidence to evaluate how learners and teachers use AI tools and what outcomes emerge."

- name: "Learning Analytics"
  description: "Uses interaction traces, dashboards, and platform data to model learning processes, behaviors, and outcomes."

- name: "Quasi-Experimental Design"
  description: "Compares outcomes across groups or conditions when full randomization is impractical in classrooms or institutions."

- name: "Case Study"
  description: "Provides rich contextual analysis of AI adoption, classroom implementation, or institutional initiatives."

- name: "Survey Research"
  description: "Captures attitudes, beliefs, self-efficacy, AI literacy, and technology acceptance across larger populations."

- name: "Systematic Literature Review"
  description: "Synthesizes existing evidence on AI in Education using explicit search, screening, and analysis procedures."

- name: "Educational Data Mining"
  description: "Applies computational methods to identify patterns in educational datasets and support prediction, classification, and adaptive interventions."
