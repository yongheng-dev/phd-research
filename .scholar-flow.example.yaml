# Scholar Flow Configuration
# Generated by /init — this is an example. Run /init to create your own.

version: 1

profile:
  field: "education"                    # Your research field
  domain_pack: "education"              # Matching domain pack in domains/
  topics:                               # Your specific research topics
    - "AI in education"
    - "AI literacy"
    - "personalized learning"
  degree: "phd"                         # undergrad | master | phd | postdoc | faculty
  language: "en"                        # Output language (en, zh, etc.)

tools:
  obsidian:
    enabled: true
    vault_path: "~/Obsidian-Vault"      # Absolute path to your Obsidian vault
    folders:
      paper_notes: "Paper Notes"
      concept_cards: "Concept Cards"
      ideation: "Ideation Sessions"
      lit_reviews: "Literature Reviews"
      search_results: "Search Results"
      daily_picks: "Daily Picks"
      writing: "Writing Drafts"
      daily_notes: "Daily Notes"
      templates: "Templates"
      attachments: "Attachments"
  zotero:
    enabled: false
    local: true
  notes_fallback: false                 # true when Obsidian is disabled

mcp_servers:
  semantic_scholar: true                # Academic paper search (no key required)
  arxiv: true                           # Preprint search (no key required)
  paper_search: true                    # Multi-source aggregation (no key required)
  zotero: false                         # Reference management
  obsidian_fs: true                     # Note-taking vault access
  brave_search: false                   # Gray literature search (key required)
  sequential_thinking: true             # Complex reasoning (no key required)

api_keys:
  semantic_scholar_env: ""              # Optional: SEMANTIC_SCHOLAR_API_KEY
  brave_search_env: ""                  # Required for brave_search: BRAVE_SEARCH_API_KEY
